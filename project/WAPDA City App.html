  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

7px; cursor:pointer;\">Notices<\u002Fspan>\n      <span data-jump=\"directory\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#37312a; color:#d8cfc3; padding:5px 10px; border-radius:7px; cursor:pointer;\">Directory<\u002Fspan>\n      <span data-jump=\"visitors\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#37312a; color:#d8cfc3; padding:5px 10px; border-radius:7px; cursor:pointer;\">Visitors<\u002Fspan>\n      <span data-jump=\"events\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#37312a; color:#d8cfc3; padding:5px 10px; border-radius:7px; cursor:pointer;\">Events<\u002Fspan>\n      <span data-jump=\"media\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#37312a; color:#d8cfc3; padding:5px 10px; border-radius:7px; cursor:pointer;\">Media<\u002Fspan>\n      <span data-jump=\"community\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#37312a; color:#d8cfc3; padding:5px 10px; border-radius:7px; cursor:pointer;\">Community<\u002Fspan>\n      <span data-jump=\"polls\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#37312a; color:#d8cfc3; padding:5px 10px; border-radius:7px; cursor:pointer;\">Polls<\u002Fspan>\n      <span data-jump=\"sos\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#37312a; color:#d8cfc3; padding:5px 10px; border-radius:7px; cursor:pointer;\">SOS<\u002Fspan>\n      <span data-jump=\"profile\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#37312a; color:#d8cfc3; padding:5px 10px; border-radius:7px; cursor:pointer;\">Profile<\u002Fspan>\n      <span data-jump=\"mcDashboard\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#4a3a30; color:#f0d9cc; padding:5px 10px; border-radius:7px; cursor:pointer;\">MC Panel<\u002Fspan>\n      <span data-jump=\"empDashboard\" onclick=\"{{ jump }}\" class=\"press\" style=\"font-size:11px; background:#4a3a30; color:#f0d9cc; padding:5px 10px; border-radius:7px; cursor:pointer;\">Employee<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { screen:'splash', tab:'home', dark:false, role:'member', regRole:'member', stack:[],\n            billTab:'pending', dirTab:'local', comFilter:'all', comTab:'social', mktFilter:'all' };\n\n  componentDidMount(){\n    this._t = setTimeout(()=> this.setState(s => s.screen==='splash' ? { screen:'welcome', stack:[] } : {}), 2300);\n  }\n  componentWillUnmount(){ clearTimeout(this._t); }\n\n  _homeFor(role){ return role==='mc' ? 'mcDashboard' : role==='employee' ? 'empDashboard' : 'home'; }\n  _navScreens(){ return ['home','media','sos','community','polls','mcDashboard','empDashboard']; }\n  _roots(){ return ['home','media','sos','community','polls']; }\n  _root(sc){ return this._navScreens().includes(sc); }\n  _tabFor(sc){ return this._roots().includes(sc) ? sc : this.state.tab; }\n\n  nav = (e)=>{ const t=e.currentTarget.dataset.screen; if(!t) return;\n    this.setState(s => ({ stack:[...s.stack, s.screen], screen:t, tab:this._roots().includes(t)?t:s.tab })); };\n  back = ()=>{ this.setState(s => { const st=[...s.stack]; const p=st.pop(); return { screen:p||'welcome', stack:st }; }); };\n  tabNav = (e)=>{ const t=e.currentTarget.dataset.tab;\n    const sc = t==='home' ? this._homeFor(this.state.role) : t;\n    this.setState({ tab:t, screen:sc, stack:[] }); };\n  jump = (e)=>{ let t=e.currentTarget.dataset.jump; if(t==='home') t=this._homeFor(this.state.role);\n    const patch={ screen:t, stack:[], tab:this._roots().includes(t)?t:'home' };\n    if(t==='mcDashboard') patch.role='mc'; else if(t==='empDashboard') patch.role='employee';\n    this.setState(patch); };\n  pickRole = (e)=>{ const r=e.currentTarget.dataset.role; const t=e.currentTarget.dataset.screen;\n    this.setState(s => ({ regRole:r, stack:[...s.stack, s.screen], screen:t })); };\n  setRole = (e)=>{ const r=e.currentTarget.dataset.role;\n    const home = r==='mc' ? 'mcDashboard' : r==='employee' ? 'empDashboard' : 'home';\n    this.setState({ role:r, screen:home, tab:'home', stack:[] }); };\n  enterApp = ()=>{ const r=this.state.regRole;\n    this.setState({ role:r, screen:(r==='mc'?'mcDashboard':r==='employee'?'empDashboard':'home'), tab:'home', stack:[] }); };\n  toggleTheme = ()=> this.setState(s=>({ dark:!s.dark }));\n  setBillTab = (e)=> this.setState({ billTab:e.currentTarget.dataset.billtab });\n  setDirTab = (e)=> this.setState({ dirTab:e.currentTarget.dataset.dirtab });\n  setComFilter = (e)=> this.setState({ comFilter:e.currentTarget.dataset.filter });\n  setComTab = (e)=> this.setState({ comTab:e.currentTarget.dataset.comtab });\n  setMktFilter = (e)=> this.setState({ mktFilter:e.currentTarget.dataset.mfilter });\n\n  renderVals(){\n    const s=this.state;\n    const names=['splash','welcome','rolePicker','regProperty','regOtp','regProfile','regPending','login',\n      'home','bills','billDetail','payMethod','paySuccess','complaints','fileComplaint','complaintDetail',\n      'notices','noticeDetail','directory','dirAddSelf','dirAddWorker','providerDetail','chat',\n      'visitors','inviteGuest','visitorPass','events','eventDetail','media','community','composePost','listingDetail','listProduct','myAds',\n      'polls','pollResults','sos','profile','settings','switchRole','notifications','mcDashboard','empDashboard'];\n    const v={}; names.forEach(n=> v['s_'+n]= s.screen===n);\n\n    // theme + role classes\n    v.themeClass = s.dark?'theme-dark':'theme-light';\n    v.roleClass = 'role-'+s.role;\n    v.themeLabel = s.dark?'Light':'Dark';\n\n    // status bar colour: white on gradient/dark-header screens\n    const gradScreens=['splash','welcome','sos','home','paySuccess','profile','eventDetail','mcDashboard','empDashboard','listingDetail'];\n    v.statusColor = gradScreens.includes(s.screen) ? '#FFFFFF' : 'var(--ink)';\n\n    v.showNav = this._root(s.screen);\n    const c=(t)=> s.tab===t ? 'var(--accent)' : 'var(--nav-idle)';\n    v.cHomeTab = (s.screen==='home'||s.screen==='mcDashboard'||s.screen==='empDashboard') ? 'var(--accent)' : 'var(--nav-idle)';\n    v.cMedia=c('media'); v.cHome=c('home'); v.cCommunity=c('community'); v.cPolls=c('polls');\n\n    // registration adaptive copy\n    const r=s.regRole;\n    v.regRoleLabel = ({member:'Owner',family:'Family Member',tenant:'Tenant',employee:'Employee'})[r]||'';\n    v.regIsEmployee = r==='employee';\n    v.regIsProperty = r!=='employee';\n    v.regIsFamily = r==='family';\n    v.regRelayNote = (r==='family'||r==='tenant')\n      ? \"An OTP will be sent to the owner's registered mobile. Ask the owner to share the code with you.\"\n      : \"An OTP will be sent to the mobile registered against this property.\";\n    v.regOtpHint = (r==='family')? \"Register as a family member of the property owner.\"\n      : (r==='tenant')? \"Register as a tenant. The owner authorises your access.\"\n      : \"Confirm the property you own.\";\n    v.regOtpTarget = (r==='family'||r==='tenant')\n      ? \"Sent to the owner's mobile +92 3xx xxxxxxx. Enter the code they share with you.\"\n      : \"Sent to +92 3xx xxxxxxx registered with this property.\";\n\n    // role buttons in navigator\n    const rb=(role,col)=> s.role===role ? col : '#37312a';\n    v.rb_member=rb('member','#C0512B'); v.rb_family=rb('family','#B7822A'); v.rb_tenant=rb('tenant','#4F8A66');\n    v.rb_employee=rb('employee','#4A7C8C'); v.rb_mc=rb('mc','#A8823C');\n\n    // bill tabs\n    const bt=s.billTab;\n    v.btP_c=bt==='pending'?'var(--accent)':'var(--mid)'; v.btP_bg=bt==='pending'?'var(--surface)':'transparent';\n    v.btD_c=bt==='paid'?'var(--accent)':'var(--mid)'; v.btD_bg=bt==='paid'?'var(--surface)':'transparent';\n    v.btA_c=bt==='all'?'var(--accent)':'var(--mid)'; v.btA_bg=bt==='all'?'var(--surface)':'transparent';\n    v.billShowPending=bt==='pending'||bt==='all'; v.billShowPaid=bt==='paid'||bt==='all';\n\n    // directory tabs\n    v.dirLocal=s.dirTab==='local'; v.dirService=s.dirTab==='service';\n    v.dt_local_c=s.dirTab==='local'?'var(--accent)':'var(--mid)'; v.dt_local_bg=s.dirTab==='local'?'var(--surface)':'transparent';\n    v.dt_serv_c=s.dirTab==='service'?'var(--accent)':'var(--mid)'; v.dt_serv_bg=s.dirTab==='service'?'var(--surface)':'transparent';\n\n    // identity by role\n    const ident=({\n      member:{name:'Ahsan Raza',role:'Owner · Verified',prop:'House H-247, Block C'},\n      family:{name:'Hira Raza',role:'Family — Sister',prop:'House H-247, Block C'},\n      tenant:{name:'Bilal Ahmed',role:'Tenant',prop:'House H-247, Block C'},\n      employee:{name:'Kashif Iqbal',role:'WC Employee · Maintenance',prop:'Staff ID WC-EMP-3391'},\n      mc:{name:'Tariq Mehmood',role:'Management Committee',prop:'WAPDA City · Admin'}\n    })[s.role];\n    v.uName=ident.name; v.uRole=ident.role; v.uProp=ident.prop; v.uInitials=ident.name.split(' ').map(x=>x[0]).join('');\n    v.isTenant=s.role==='tenant'; v.notTenant=s.role!=='tenant';\n\n    // live greeting\n    const h=new Date().getHours();\n    v.greeting = h<12?'Good Morning':h<17?'Good Afternoon':h<21?'Good Evening':'Good Night';\n\n    // community filter chip helper handled in template via active flags\n    v.cf=s.comFilter;\n    // community sub-tabs (social / marketplace)\n    v.comSocial = s.comTab==='social'; v.comMarket = s.comTab==='market';\n    v.ctSocial_c = s.comTab==='social'?'var(--accent)':'var(--mid)'; v.ctSocial_bg = s.comTab==='social'?'var(--surface)':'transparent';\n    v.ctMarket_c = s.comTab==='market'?'var(--accent)':'var(--mid)'; v.ctMarket_bg = s.comTab==='market'?'var(--surface)':'transparent';\n\n    // handlers\n    Object.assign(v,{ nav:this.nav, back:this.back, tabNav:this.tabNav, jump:this.jump, pickRole:this.pickRole,\n      setRole:this.setRole, enterApp:this.enterApp, toggleTheme:this.toggleTheme, setBillTab:this.setBillTab,\n      setDirTab:this.setDirTab, setComFilter:this.setComFilter, setComTab:this.setComTab, setMktFilter:this.setMktFilter });\n    return v;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
